name: heartbeat-check
# Off-host audit that is STATEFUL: it remembers the last state (on the 'iris-state'
# branch) so it fires ONCE when a problem starts, stays quiet while it persists, and
# posts a "✅ Recovered / all clear" when it resolves. It also separates a real
# CONFIG CHANGE (🚨) from a network/monitoring blip (⏳ — explicitly "not a config change").
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write   # to persist alert state on the iris-state branch

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Load heartbeats + previous alert state
        run: |
          git fetch origin heartbeat 2>/dev/null && git checkout origin/heartbeat -- heartbeat 2>/dev/null || true
          git fetch origin iris-state 2>/dev/null || true
          git show origin/iris-state:state.json > /tmp/prevstate.json 2>/dev/null || echo '{}' > /tmp/prevstate.json
          echo "previous state:"; cat /tmp/prevstate.json
      - name: Check + notify on state changes
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import glob, json, os, subprocess, sys, time, urllib.request

          def post(title, desc, color):
              url = os.environ.get("DISCORD_WEBHOOK_URL", "")
              print(f"[post] {title} :: {desc}")
              if not url:
                  return
              body = {"embeds": [{"title": title, "description": desc, "color": color}]}
              try:
                  urllib.request.urlopen(urllib.request.Request(
                      url, data=json.dumps(body).encode(),
                      headers={"Content-Type": "application/json", "User-Agent": "RageQuit-Iris/1.0"}), timeout=15)
              except Exception:
                  print("discord post failed (network or webhook error)")

          def approved_for(g):
              ap = os.path.join("games", g, "config", "approved.sha256")
              if os.path.exists(ap):
                  for line in open(ap):
                      line = line.strip()
                      if line and not line.startswith("#"):
                          return line
              return None

          def last_change(g):
              try:
                  return subprocess.run(["git", "log", "-1", "--format=%cr", "--",
                                         f"games/{g}/game.env", f"games/{g}/stack.env",
                                         f"games/{g}/docker-compose.yml", f"games/{g}/manifest.json"],
                                        capture_output=True, text=True, timeout=20).stdout.strip() or "unknown"
              except Exception:
                  return "unknown"

          try:
              prev = json.load(open("/tmp/prevstate.json"))
          except Exception:
              prev = {}

          MAX_AGE = 1800
          now = int(time.time())
          games = [os.path.basename(d.rstrip("/")) for d in glob.glob("games/*/")
                   if not os.path.basename(d.rstrip("/")).startswith("_")]

          cur = {}   # game -> (problem: bool, kind, message)
          for g in games:
              hb_path = f"heartbeat/{g}.json"
              if not os.path.exists(hb_path):
                  cur[g] = (True, "no-report", f"**{g}**: the monitor has never reported yet."); continue
              hb = json.load(open(hb_path))
              if hb.get("status") == "not-started":
                  cur[g] = (False, "", ""); continue
              age = now - int(hb.get("ts", 0)); fresh = age <= MAX_AGE
              approved = approved_for(g)
              mismatch = (approved and approved != "REPLACE_AFTER_FIRST_DEPLOY"
                          and hb.get("runtime_config_sha256") != approved)
              if fresh and mismatch:
                  cur[g] = (True, "drift", f"**{g}**: the LIVE config no longer matches the approved baseline "
                                           f"(approved config last changed {last_change(g)}). This is a real change — investigate.")
              elif not fresh:
                  cur[g] = (True, "lost-contact",
                            f"**{g}**: the audit **lost contact** with the monitor ~{age//60} min ago — almost always a "
                            f"network/monitoring hiccup. **This is NOT a config change**; last verified config matched "
                            f"approved (last real config change: {last_change(g)}).")
              elif hb.get("status") == "server-down":
                  cur[g] = (True, "offline", f"**{g}**: server appears **OFFLINE** (container not running). Config unchanged.")
              elif hb.get("status") != "ok":
                  cur[g] = (True, "status", f"**{g}**: watcher reports `{hb.get('status')}` (config still matches approved).")
              else:
                  cur[g] = (False, "", "")

          fires = []; resolves = []; newstate = {}
          for g, (problem, kind, msg) in cur.items():
              was = bool(prev.get(g, {}).get("alerting", False))
              newstate[g] = {"alerting": problem, "kind": kind}
              if problem and not was:
                  fires.append((kind, msg))
              elif (not problem) and was:
                  resolves.append(g)

          stamp = time.strftime("%Y-%m-%d %H:%M UTC", time.gmtime())
          crit = [m for k, m in fires if k == "drift"]
          warn = [m for k, m in fires if k != "drift"]
          if crit:
              body = "\n".join("• " + m for m in crit)
              if warn: body += "\n\nAlso:\n" + "\n".join("• " + m for m in warn)
              post("🚨 The Iris — CONFIG CHANGE detected", body, 0xE01E1E)
          elif warn:
              post("⏳ The Iris — monitoring notice (not a config change)",
                   "\n".join("• " + m for m in warn) +
                   "\n\n_No config change was detected — this is about reachability/monitoring only._", 0xE67E22)

          if resolves:
              post("✅ The Iris — RECOVERED / all clear",
                   "\n".join(f"• **{g}**: back to healthy — server online and live config matches the approved baseline." for g in resolves) +
                   f"\n\n_The earlier warning is resolved. Cleared {stamp}._", 0x2ECC71)

          any_problem = any(p for p, _, _ in cur.values())
          if (not any_problem) and (not resolves) and os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              post("✅ The Iris — manual check", "All servers healthy; live config matches the approved baseline.", 0x2ECC71)

          json.dump(newstate, open("/tmp/newstate.json", "w"))
          print("fires:", len(fires), "resolves:", len(resolves), "state:", newstate)
          PY
      - name: Persist alert state (iris-state branch)
        if: always()
        run: |
          [ -f /tmp/newstate.json ] || echo '{}' > /tmp/newstate.json
          cp /tmp/newstate.json state.json
          git checkout --orphan _iris_state
          git reset -q
          git add -f state.json
          git -c user.email=iris@users.noreply.github.com -c user.name=iris-state commit -q -m "iris alert state" || exit 0
          git push -f origin _iris_state:iris-state 2>&1 | tail -2
