name: heartbeat-check
# Runs on GitHub's infrastructure (off your host). Separates TWO very different things:
#   • CONFIG CHANGE (live config no longer matches the approved baseline) -> 🚨 red
#   • LOST CONTACT / server offline (a network or monitoring issue) -> ⏳ amber, and it
#     explicitly says this is NOT a config change (the last verified config was fine).
# So a network blip never gets read as "the host tampered with something".
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Load latest heartbeats from the heartbeat branch
        run: |
          if git fetch origin heartbeat 2>/dev/null; then
            git checkout origin/heartbeat -- heartbeat 2>/dev/null || true
          fi
      - name: Verify every game's heartbeat + config
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import glob, json, os, subprocess, sys, time, urllib.request

          def alert(title, desc, color):
              url = os.environ.get("DISCORD_WEBHOOK_URL", "")
              print(title, "::", desc)
              if not url:
                  return
              body = {"embeds": [{"title": title, "description": desc, "color": color}]}
              try:
                  urllib.request.urlopen(urllib.request.Request(
                      url, data=json.dumps(body).encode(),
                      headers={"Content-Type": "application/json", "User-Agent": "RageQuit-Iris/1.0"}), timeout=15)
              except Exception:
                  print("discord post failed (network or webhook error)")

          def approved_for(game):
              ap = os.path.join("games", game, "config", "approved.sha256")
              if os.path.exists(ap):
                  for line in open(ap):
                      line = line.strip()
                      if line and not line.startswith("#"):
                          return line
              return None

          def last_config_change(game):
              # human-readable age of the last commit that touched this game's config
              try:
                  return subprocess.run(
                      ["git", "log", "-1", "--format=%cr", "--",
                       f"games/{game}/game.env", f"games/{game}/stack.env",
                       f"games/{game}/docker-compose.yml", f"games/{game}/manifest.json"],
                      capture_output=True, text=True, timeout=20).stdout.strip() or "unknown"
              except Exception:
                  return "unknown"

          MAX_AGE = 1800  # 30 minutes
          now = int(time.time())
          critical = []   # live config actually changed vs approved
          notices = []    # lost contact / offline — NOT a config change

          games = [os.path.basename(d.rstrip("/")) for d in glob.glob("games/*/")
                   if not os.path.basename(d.rstrip("/")).startswith("_")]
          hbs = glob.glob("heartbeat/*.json")
          reported = {os.path.splitext(os.path.basename(h))[0] for h in hbs}
          for g in games:
              if g not in reported:
                  notices.append(f"• **{g}**: the monitor has never reported yet.")

          for h in hbs:
              g = os.path.splitext(os.path.basename(h))[0]
              hb = json.load(open(h))
              if hb.get("status") == "not-started":
                  continue
              age = now - int(hb.get("ts", 0))
              fresh = age <= MAX_AGE
              approved = approved_for(g)
              mismatch = (approved and approved != "REPLACE_AFTER_FIRST_DEPLOY"
                          and hb.get("runtime_config_sha256") != approved)

              if fresh and mismatch:
                  critical.append(f"• **{g}**: the LIVE config no longer matches the approved baseline "
                                  f"(approved config last changed {last_config_change(g)}). This is a real change — investigate.")
              elif fresh and hb.get("status") == "server-down":
                  notices.append(f"• **{g}**: server appears **OFFLINE** (container not running). Config itself is unchanged.")
              elif fresh and hb.get("status") != "ok":
                  notices.append(f"• **{g}**: watcher reports `{hb.get('status')}`. (Config still matches approved.)")

              if not fresh:
                  notices.append(
                      f"• **{g}**: the audit **lost contact** with the server monitor ~{age//60} min ago — "
                      f"almost always a network/monitoring hiccup. **This is NOT a config change**; the last "
                      f"verified config matched the approved baseline (last real config change: {last_config_change(g)}).")

          if critical:
              body = "\n".join(critical)
              if notices:
                  body += "\n\nAlso:\n" + "\n".join(notices)
              alert("🚨 The Iris — CONFIG CHANGE detected", body, 0xE01E1E)
              sys.exit(1)
          if notices:
              alert("⏳ The Iris — monitoring notice (not a config change)",
                    "\n".join(notices) +
                    "\n\n_No config change was detected. This is about reachability/monitoring only._",
                    0xE67E22)
              sys.exit(0)
          print("All heartbeats OK")

          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              alert("✅ The Iris — manual check",
                    "All servers healthy; live config matches the approved baseline.", 0x2ECC71)
          PY
